<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>结账 - Direct API Subscription Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: 'rgb(2, 117, 221)',
                        secondary: '#10B981',
                        neutral: '#6B7280',
                        'neutral-light': '#F3F4F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="bg-[rgb(2,117,221)] border-b border-gray-200">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="http://localhost:8080/" class="text-white text-sm font-medium hover:underline mr-6">Back to Site</a>
                        <div class="flex-shrink-0 flex items-center">
                            <i class="fa fa-credit-card text-white text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-white">Direct API Subscription</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <a href="https://evonetglobal.com/zh/contact-us/" target="_blank" class="text-sm font-medium text-white hover:underline">联系我们</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow">
            <div class="max-w-6xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                <div class="bg-white rounded-lg card-shadow overflow-hidden">
                    <div class="grid grid-cols-1 lg:grid-cols-2 min-h-[600px]">
                        <div class="bg-gray-50 p-8 border-r border-gray-200">
                            <h2 class="text-2xl font-bold text-gray-900 mb-6">订阅信息</h2>
                            
                            <div class="space-y-6">
                                <div class="bg-white rounded-lg p-6 shadow-sm">
                                    <h3 class="text-lg font-semibold text-gray-900 mb-4">已选方案</h3>
                                    <div id="planInfo" class="space-y-3">
                                        <div class="animate-pulse space-y-3">
                                            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                                            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                                        </div>
                                    </div>
                                </div>
                                
                                <div class="bg-white rounded-lg p-6 shadow-sm">
                                    <h3 class="text-lg font-semibold text-gray-900 mb-4">方案详情</h3>
                                    <div id="planDetails">
                                        <div class="animate-pulse space-y-3">
                                            <div class="h-4 bg-gray-200 rounded w-full"></div>
                                            <div class="h-4 bg-gray-200 rounded w-full"></div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-white p-8 flex flex-col">
                            <h2 class="text-2xl font-bold text-gray-900 mb-6">客户信息与支付</h2>
                            
                            <form id="checkoutForm" class="flex-grow flex flex-col">
                                <div class="flex-grow space-y-6">
                                    <div class="border-b border-gray-200 pb-6">
                                        <h3 class="text-lg font-medium text-gray-900 mb-4">客户信息</h3>
                                        <div class="space-y-4">
                                            <div class="grid grid-cols-2 gap-4">
                                                <div>
                                                    <label for="customerName" class="block text-sm font-medium text-gray-700 mb-1">姓名 *</label>
                                                    <input type="text" id="customerName" name="customerName" required
                                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                                        placeholder="请输入您的姓名">
                                                </div>
                                                <div>
                                                    <label for="customerEmail" class="block text-sm font-medium text-gray-700 mb-1">邮箱 *</label>
                                                    <input type="email" id="customerEmail" name="customerEmail" required
                                                        class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                                        placeholder="请输入您的邮箱">
                                                </div>
                                            </div>
                                            <div>
                                                <label for="customerPhone" class="block text-sm font-medium text-gray-700 mb-1">手机号码</label>
                                                <input type="tel" id="customerPhone" name="customerPhone"
                                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                                    placeholder="请输入您的手机号码">
                                            </div>
                                            <div class="p-4 bg-gray-50 rounded-lg">
                                                <label class="flex items-start">
                                                    <input type="checkbox" id="agreeTerms" name="agreeTerms" required
                                                        class="mt-1 h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                                                    <span class="ml-3 text-sm text-gray-600">
                                                        我已阅读并同意 <a href="#" class="text-primary hover:underline">隐私政策</a> 和 <a href="#" class="text-primary hover:underline">服务条款</a>
                                                    </span>
                                                </label>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div>
                                        <h3 class="text-lg font-medium text-gray-900 mb-4">支付方式</h3>
                                        <div class="space-y-4">
                                            <div class="border border-gray-300 rounded-md p-4">
                                                <div class="flex items-center">
                                                    <input type="radio" id="payment-card" name="paymentMethod" value="card" class="h-4 w-4 text-primary focus:ring-primary" checked>
                                                    <label for="payment-card" class="ml-2 block text-sm font-medium text-gray-900">银行卡</label>
                                                </div>
                                                <div id="card-details" class="mt-4 space-y-3">
                                                    <div>
                                                        <label for="cardNumber" class="block text-sm font-medium text-gray-700 mb-1">卡号</label>
                                                        <input type="text" id="cardNumber" name="cardNumber" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入卡号" value="4761360072118507">
                                                    </div>
                                                    <div class="grid grid-cols-2 gap-4">
                                                        <div>
                                                            <label for="expiryDate" class="block text-sm font-medium text-gray-700 mb-1">有效期</label>
                                                            <input type="text" id="expiryDate" name="expiryDate" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="MMYY" value="0529">
                                                        </div>
                                                        <div>
                                                            <label for="holderName" class="block text-sm font-medium text-gray-700 mb-1">持卡人姓名</label>
                                                            <input type="text" id="holderName" name="holderName" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent" placeholder="请输入持卡人姓名" value="Paulette Homenick">
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div class="border border-gray-300 rounded-md p-4">
                                                <div class="flex items-center">
                                                    <input type="radio" id="payment-ewallet" name="paymentMethod" value="e-wallet" class="h-4 w-4 text-primary focus:ring-primary">
                                                    <label for="payment-ewallet" class="ml-2 block text-sm font-medium text-gray-900">电子钱包</label>
                                                </div>
                                                <div id="ewallet-details" class="mt-4 space-y-3 hidden">
                                                    <div>
                                                        <label for="walletBrand" class="block text-sm font-medium text-gray-700 mb-1">钱包品牌</label>
                                                        <select id="walletBrand" name="walletBrand" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
                                                            <option value="Merpay">Merpay</option>
                                                        </select>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    <div class="bg-yellow-50 rounded-lg p-4">
                                        <label class="flex items-start">
                                            <input type="checkbox" id="saveCard" name="saveCard" checked
                                                class="mt-1 h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                                            <span class="ml-3 text-sm text-gray-600">
                                                <strong>保存卡片信息用于自动续费</strong><br>
                                                <span class="text-xs text-gray-500">勾选后，卡片信息将被安全保存，用于后续订阅自动扣费</span>
                                            </span>
                                        </label>
                                    </div>
                                </div>
                                
                                <div class="mt-6 pt-6 border-t border-gray-200">
                                    <div class="flex justify-between items-center">
                                        <a href="/" class="inline-flex items-center px-6 py-3 border border-gray-300 rounded-lg text-gray-700 hover:bg-gray-50 transition-colors duration-200">
                                            <i class="fa fa-arrow-left mr-2"></i>
                                            返回重新选择
                                        </a>
                                        <button type="submit" id="payBtn" class="bg-primary hover:bg-primary/90 text-white font-medium py-3 px-8 rounded-lg transition-colors duration-200 flex items-center justify-center text-lg">
                                            <i class="fa fa-credit-card mr-2"></i>
                                            立即订阅
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <footer class="bg-[rgb(2,117,221)] py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div class="mb-4 md:mb-0">
                        <p class="text-sm text-white">© 2026 Direct API Subscription Demo. 保留所有权利。</p>
                    </div>
                    <div class="flex space-x-6">
                        <a href="#" class="text-sm text-white hover:underline">隐私政策</a>
                        <a href="#" class="text-sm text-white hover:underline">服务条款</a>
                        <a href="#" class="text-sm text-white hover:underline">关于我们</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let selectedPlan = null;
        
        const urlParams = new URLSearchParams(window.location.search);
        const planId = urlParams.get('planId');
        
        async function loadPlanInfo() {
            if (!planId) {
                window.location.href = '/';
                return;
            }
            
            try {
                const response = await fetch(`/api/plans/${planId}`);
                const data = await response.json();
                
                if (data.success && data.plan) {
                    selectedPlan = data.plan;
                    renderPlanInfo();
                } else {
                    throw new Error('Plan not found');
                }
            } catch (error) {
                console.error('Failed to load plan:', error);
                window.location.href = '/';
            }
        }
        
        function renderPlanInfo() {
            document.getElementById('planInfo').innerHTML = `
                <div class="space-y-3">
                    <div class="flex justify-between items-center py-2 border-b border-gray-100">
                        <span class="text-neutral">订阅方案</span>
                        <span class="font-semibold text-gray-900">${selectedPlan.name}</span>
                    </div>
                    <div class="flex justify-between items-center py-2 border-b border-gray-100">
                        <span class="text-neutral">计费周期</span>
                        <span class="font-medium text-gray-900">${selectedPlan.billingCycle === 'monthly' ? '每月' : '每年'}</span>
                    </div>
                    <div class="flex justify-between items-center py-2">
                        <span class="text-neutral">订阅金额</span>
                        <span class="font-bold text-xl text-primary">$${selectedPlan.price}</span>
                    </div>
                </div>
            `;
            
            document.getElementById('planDetails').innerHTML = `
                <div>
                    <p class="text-gray-600 mb-4">${selectedPlan.description}</p>
                    <h4 class="font-semibold text-gray-900 mb-3">方案包含：</h4>
                    <ul class="space-y-2">
                        ${selectedPlan.features.map(feature => `
                            <li class="flex items-center text-sm text-gray-600">
                                <i class="fa fa-check-circle text-secondary mr-3"></i>
                                ${feature}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
        }
        
        document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
            radio.addEventListener('change', function() {
                document.getElementById('card-details').classList.add('hidden');
                document.getElementById('ewallet-details').classList.add('hidden');
                
                if (this.value === 'card') {
                    document.getElementById('card-details').classList.remove('hidden');
                } else if (this.value === 'e-wallet') {
                    document.getElementById('ewallet-details').classList.remove('hidden');
                }
            });
        });
        
        document.getElementById('checkoutForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const customerName = document.getElementById('customerName').value.trim();
            const customerEmail = document.getElementById('customerEmail').value.trim();
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            if (!customerName || !customerEmail) {
                alert('请填写姓名和邮箱');
                return;
            }
            
            if (!agreeTerms) {
                alert('请同意隐私政策和服务条款');
                return;
            }
            
            const payBtn = document.getElementById('payBtn');
            payBtn.disabled = true;
            payBtn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i> 处理中...';
            
            try {
                const customerInfo = {
                    name: customerName,
                    email: customerEmail,
                    phone: document.getElementById('customerPhone').value.trim()
                };
                
                const createResponse = await fetch('/api/subscription/create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        planId: planId,
                        customerInfo: customerInfo,
                        agreeTerms: agreeTerms
                    })
                });
                
                const createData = await createResponse.json();
                
                if (!createData.success || !createData.subscription) {
                    throw new Error(createData.error || '创建订阅失败');
                }
                
                const subscription = createData.subscription;
                
                const paymentMethodType = document.querySelector('input[name="paymentMethod"]:checked').value;
                let paymentMethod = { type: paymentMethodType };
                
                if (paymentMethodType === 'card') {
                    paymentMethod.card = {
                        cardInfo: {
                            cardNumber: document.getElementById('cardNumber').value,
                            expiryDate: document.getElementById('expiryDate').value,
                            holderName: document.getElementById('holderName').value
                        }
                    };
                } else if (paymentMethodType === 'e-wallet') {
                    paymentMethod['e-wallet'] = {
                        paymentBrand: document.getElementById('walletBrand').value
                    };
                }
                
                const paymentResponse = await fetch(`/api/subscription/${subscription.id}/direct-payment`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        paymentMethod: paymentMethod,
                        saveCard: document.getElementById('saveCard').checked
                    })
                });
                
                const paymentData = await paymentResponse.json();
                console.log('Payment response:', paymentData);
                
                if (paymentData.success && paymentData.result) {
                    const result = paymentData.result;
                    
                    if (result.action && result.action.threeDSData && result.action.threeDSData.url) {
                        window.location.href = result.action.threeDSData.url;
                        return;
                    }
                    
                    if (result.action && result.action.redirectData && result.action.redirectData.url) {
                        window.location.href = result.action.redirectData.url;
                        return;
                    }
                    
                    if (result.result && result.result.code === 'S0000') {
                        if (result.payment && result.payment.status === 'captured') {
                            window.location.href = `/success.html?subscriptionId=${subscription.id}`;
                            return;
                        }
                    }
                }
                
                throw new Error(paymentData.message || paymentData.error || '支付请求失败');
                
            } catch (error) {
                console.error('Payment error:', error);
                alert('支付失败: ' + error.message);
                payBtn.disabled = false;
                payBtn.innerHTML = '<i class="fa fa-credit-card mr-2"></i> 立即订阅';
            }
        });
        
        loadPlanInfo();
    </script>
</body>
</html>
