<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>订阅成功 - LinkPay Subscription Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0275DD',
                        secondary: '#10B981',
                        neutral: '#6B7280',
                        'neutral-light': '#F3F4F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="bg-primary border-b border-primary/80">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="http://localhost:8080/" class="flex-shrink-0 flex items-center text-white/90 hover:text-white mr-6">
                            <span class="text-sm font-medium">Back to Site</span>
                        </a>
                        <div class="flex-shrink-0 flex items-center border-l border-white/30 pl-6">
                            <i class="fa fa-credit-card text-white text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-white">LinkPay Subscription</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <a href="https://evonetglobal.com/zh/contact-us/" target="_blank" class="text-sm font-medium text-white/90 hover:text-white">联系我们</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow">
            <div class="max-w-2xl mx-auto px-4 sm:px-6 lg:px-8 py-16">
                <div class="bg-white rounded-lg card-shadow p-8 text-center">
                    <div class="inline-flex items-center justify-center w-20 h-20 rounded-full bg-green-100 mb-6">
                        <i class="fa fa-check text-3xl text-green-600"></i>
                    </div>
                    <h1 class="text-3xl font-bold text-gray-900 mb-4">订阅成功！</h1>
                    <p class="text-neutral mb-8">感谢您的订阅，您的订阅已成功激活。</p>
                    
                    <div id="subscriptionDetails" class="bg-gray-50 rounded-lg p-6 mb-8 text-left">
                        <div class="animate-pulse space-y-4">
                            <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                            <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                            <div class="h-4 bg-gray-200 rounded w-2/3"></div>
                        </div>
                    </div>

                    <div class="space-y-4">
                        <a href="subscription-management.html" class="block w-full bg-primary hover:bg-primary/90 text-white font-medium py-3 px-6 rounded-lg transition-colors duration-200">
                            <i class="fa fa-cog mr-2"></i>
                            管理我的订阅
                        </a>
                        <a href="/" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-900 font-medium py-3 px-6 rounded-lg transition-colors duration-200">
                            <i class="fa fa-home mr-2"></i>
                            返回首页
                        </a>
                    </div>
                </div>

                <div class="mt-8 bg-blue-50 rounded-lg p-6">
                    <h3 class="font-semibold text-gray-900 mb-3 flex items-center">
                        <i class="fa fa-info-circle text-primary mr-2"></i>
                        重要提示
                    </h3>
                    <ul class="space-y-2 text-sm text-gray-600">
                        <li class="flex items-start">
                            <i class="fa fa-check text-secondary mr-2 mt-1"></i>
                            订阅确认邮件已发送至您的邮箱
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-check text-secondary mr-2 mt-1"></i>
                            自动续费将在到期前3天发送提醒邮件
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-check text-secondary mr-2 mt-1"></i>
                            您可以随时在订阅管理页面取消或更改订阅
                        </li>
                    </ul>
                </div>
            </div>
        </main>

        <footer class="bg-primary border-t border-primary/80 py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div class="mb-4 md:mb-0">
                        <p class="text-sm text-white/80">© 2026 LinkPay Subscription Demo. 保留所有权利。</p>
                    </div>
                    <div class="flex space-x-6">
                        <a href="#" class="text-sm text-white/80 hover:text-white">隐私政策</a>
                        <a href="#" class="text-sm text-white/80 hover:text-white">服务条款</a>
                        <a href="#" class="text-sm text-white/80 hover:text-white">关于我们</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        function formatDate(isoString) {
            return new Date(isoString).toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadSubscriptionDetails() {
            const urlParams = new URLSearchParams(window.location.search);
            const subscriptionId = urlParams.get('subscriptionId');
            
            if (!subscriptionId) {
                document.getElementById('subscriptionDetails').innerHTML = `
                    <p class="text-center text-neutral">订阅信息加载中...</p>
                `;
                return;
            }
            
            try {
                const response = await fetch(`/api/subscription/${subscriptionId}`);
                const data = await response.json();
                
                if (data.success && data.subscription) {
                    const sub = data.subscription;
                    
                    document.getElementById('subscriptionDetails').innerHTML = `
                        <div class="space-y-4">
                            <div class="flex justify-between items-center py-3 border-b border-gray-200">
                                <span class="text-neutral">订阅方案</span>
                                <span class="font-semibold text-gray-900">${sub.plan.name}</span>
                            </div>
                            <div class="flex justify-between items-center py-3 border-b border-gray-200">
                                <span class="text-neutral">订阅状态</span>
                                <span class="inline-flex items-center px-3 py-1 rounded-full text-sm font-medium bg-green-100 text-green-800">已支付</span>
                            </div>
                            <div class="flex justify-between items-center py-3 border-b border-gray-200">
                                <span class="text-neutral">订阅金额</span>
                                <span class="font-bold text-primary">$${sub.plan.price}/月</span>
                            </div>
                            <div class="flex justify-between items-center py-3 border-b border-gray-200">
                                <span class="text-neutral">订阅时间</span>
                                <span class="font-medium text-gray-900">${formatDate(sub.createdAt)}</span>
                            </div>
                            <div class="flex justify-between items-center py-3 border-b border-gray-200">
                                <span class="text-neutral">下次扣款日期</span>
                                <span class="font-medium text-gray-900">${formatDate(sub.nextBillingDate)}</span>
                            </div>
                            <div class="flex justify-between items-center py-3">
                                <span class="text-neutral">客户ID</span>
                                <span class="font-medium text-gray-900 text-sm">${sub.customerId}</span>
                            </div>
                        </div>
                    `;
                }
            } catch (error) {
                console.error('Failed to load subscription:', error);
                document.getElementById('subscriptionDetails').innerHTML = `
                    <p class="text-center text-red-500">加载订阅信息失败</p>
                `;
            }
        }

        loadSubscriptionDetails();
    </script>
</body>
</html>
