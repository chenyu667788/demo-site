<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>确认订阅 - LinkPay Subscription Demo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#0275DD',
                        secondary: '#10B981',
                        neutral: '#6B7280',
                        'neutral-light': '#F3F4F6',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .card-shadow {
                box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            }
        }
    </style>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col">
        <header class="bg-primary border-b border-primary/80">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex justify-between h-16">
                    <div class="flex items-center">
                        <a href="http://localhost:8080/" class="flex-shrink-0 flex items-center text-white/90 hover:text-white mr-6">
                            <span class="text-sm font-medium">Back to Site</span>
                        </a>
                        <div class="flex-shrink-0 flex items-center border-l border-white/30 pl-6">
                            <i class="fa fa-credit-card text-white text-2xl mr-2"></i>
                            <span class="text-xl font-bold text-white">LinkPay Subscription</span>
                        </div>
                    </div>
                    <div class="flex items-center">
                        <a href="https://evonetglobal.com/zh/contact-us/" target="_blank" class="text-sm font-medium text-white/90 hover:text-white">联系我们</a>
                    </div>
                </div>
            </div>
        </header>

        <main class="flex-grow">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
                <div class="mb-8">
                    <a href="/" class="text-primary hover:underline text-sm">
                        <i class="fa fa-arrow-left mr-2"></i>返回选择方案
                    </a>
                </div>

                <h1 class="text-3xl font-bold text-gray-900 mb-8">确认订阅</h1>

                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white rounded-lg card-shadow p-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center">
                            <i class="fa fa-list-alt text-primary mr-3"></i>
                            已选方案
                        </h2>
                        <div id="selectedPlanInfo">
                            <div class="animate-pulse space-y-4">
                                <div class="h-4 bg-gray-200 rounded w-3/4"></div>
                                <div class="h-4 bg-gray-200 rounded w-1/2"></div>
                            </div>
                        </div>
                    </div>

                    <div class="bg-white rounded-lg card-shadow p-8">
                        <h2 class="text-xl font-bold text-gray-900 mb-6 flex items-center">
                            <i class="fa fa-user text-primary mr-3"></i>
                            客户信息
                        </h2>
                        <form id="customerForm" class="space-y-4">
                            <div>
                                <label for="customerName" class="block text-sm font-medium text-gray-700 mb-1">姓名 <span class="text-red-500">*</span></label>
                                <input type="text" id="customerName" name="customerName" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                    placeholder="请输入您的姓名">
                            </div>
                            <div>
                                <label for="customerEmail" class="block text-sm font-medium text-gray-700 mb-1">邮箱 <span class="text-red-500">*</span></label>
                                <input type="email" id="customerEmail" name="customerEmail" required
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                    placeholder="请输入您的邮箱">
                            </div>
                            <div>
                                <label for="customerPhone" class="block text-sm font-medium text-gray-700 mb-1">手机号码</label>
                                <input type="tel" id="customerPhone" name="customerPhone"
                                    class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent"
                                    placeholder="请输入您的手机号码">
                            </div>
                        </form>
                    </div>
                </div>

                <div class="mt-8 bg-white rounded-lg card-shadow p-6">
                    <h3 class="text-lg font-semibold text-gray-900 mb-4">订阅周期信息</h3>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-gray-50 rounded-lg p-4">
                            <p class="text-sm text-neutral mb-1">首次订阅时间</p>
                            <p class="font-medium text-gray-900" id="startDate">-</p>
                        </div>
                        <div class="bg-gray-50 rounded-lg p-4">
                            <p class="text-sm text-neutral mb-1">到期/自动扣款时间</p>
                            <p class="font-medium text-gray-900" id="endDate">-</p>
                        </div>
                    </div>
                </div>

                <div class="mt-8 bg-blue-50 rounded-lg p-6">
                    <h3 class="font-semibold text-gray-900 mb-3 flex items-center">
                        <i class="fa fa-info-circle text-primary mr-2"></i>
                        重要提示
                    </h3>
                    <ul class="space-y-2 text-sm text-gray-600">
                        <li class="flex items-start">
                            <i class="fa fa-check text-secondary mr-2 mt-0.5"></i>
                            首次订阅时请在支付页面勾选"Save card details for next time"以保存卡片信息
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-check text-secondary mr-2 mt-0.5"></i>
                            保存卡片后将支持自动续费功能
                        </li>
                        <li class="flex items-start">
                            <i class="fa fa-check text-secondary mr-2 mt-0.5"></i>
                            您可以随时在订阅管理页面取消订阅
                        </li>
                    </ul>
                </div>

                <div class="mt-8 bg-white rounded-lg card-shadow p-6">
                    <label class="flex items-start">
                        <input type="checkbox" id="agreeTerms" name="agreeTerms"
                            class="mt-1 h-4 w-4 text-primary focus:ring-primary border-gray-300 rounded">
                        <span class="ml-3 text-sm text-gray-600">
                            我已阅读并同意 <a href="#" class="text-primary hover:underline">隐私政策</a> 和 <a href="#" class="text-primary hover:underline">服务条款</a>
                        </span>
                    </label>
                </div>

                <div class="mt-8 flex justify-center">
                    <button id="subscribeBtn" disabled
                        class="bg-primary hover:bg-primary/90 disabled:bg-gray-300 disabled:cursor-not-allowed text-white font-medium py-4 px-16 rounded-lg transition-colors duration-200 text-lg">
                        <i class="fa fa-shopping-cart mr-2"></i>
                        立即订阅
                    </button>
                </div>
            </div>
        </main>

        <footer class="bg-primary border-t border-primary/80 py-8">
            <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-col md:flex-row justify-between items-center">
                    <div class="mb-4 md:mb-0">
                        <p class="text-sm text-white/80">© 2026 LinkPay Subscription Demo. 保留所有权利。</p>
                    </div>
                    <div class="flex space-x-6">
                        <a href="#" class="text-sm text-white/80 hover:text-white">隐私政策</a>
                        <a href="#" class="text-sm text-white/80 hover:text-white">服务条款</a>
                        <a href="#" class="text-sm text-white/80 hover:text-white">关于我们</a>
                    </div>
                </div>
            </div>
        </footer>
    </div>

    <script>
        let selectedPlan = null;

        function formatDate(date) {
            return date.toLocaleDateString('zh-CN', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        async function loadPlanInfo() {
            const urlParams = new URLSearchParams(window.location.search);
            const planId = urlParams.get('planId');
            
            if (!planId) {
                window.location.href = '/';
                return;
            }
            
            try {
                const response = await fetch(`/api/plans/${planId}`);
                const data = await response.json();
                
                if (data.success && data.plan) {
                    selectedPlan = data.plan;
                    renderPlanInfo();
                } else {
                    throw new Error('Plan not found');
                }
            } catch (error) {
                console.error('Failed to load plan:', error);
                alert('加载方案失败，请重新选择');
                window.location.href = '/';
            }
        }

        function renderPlanInfo() {
            const container = document.getElementById('selectedPlanInfo');
            container.innerHTML = `
                <div class="border-b border-gray-100 pb-4 mb-4">
                    <div class="flex justify-between items-center">
                        <div>
                            <h3 class="text-xl font-bold text-gray-900">${selectedPlan.name}</h3>
                            <p class="text-sm text-neutral mt-1">${selectedPlan.description}</p>
                        </div>
                        ${selectedPlan.popular ? '<span class="bg-primary text-white text-xs font-bold px-2 py-1 rounded">最受欢迎</span>' : ''}
                    </div>
                </div>
                <div class="mb-4">
                    <p class="text-3xl font-bold text-primary">$${selectedPlan.price}<span class="text-base font-normal text-neutral">/${selectedPlan.billingCycle === 'monthly' ? '月' : '年'}</span></p>
                </div>
                <div>
                    <h4 class="text-sm font-medium text-gray-700 mb-2">方案包含：</h4>
                    <ul class="space-y-2">
                        ${selectedPlan.features.map(f => `
                            <li class="flex items-center text-sm text-gray-600">
                                <i class="fa fa-check-circle text-secondary mr-2"></i>
                                ${f}
                            </li>
                        `).join('')}
                    </ul>
                </div>
            `;
            
            const now = new Date();
            const endDate = new Date(now);
            endDate.setMonth(endDate.getMonth() + 1);
            
            document.getElementById('startDate').textContent = formatDate(now);
            document.getElementById('endDate').textContent = formatDate(endDate);
        }

        function updateSubscribeButton() {
            const customerName = document.getElementById('customerName').value.trim();
            const customerEmail = document.getElementById('customerEmail').value.trim();
            const agreeTerms = document.getElementById('agreeTerms').checked;
            
            const btn = document.getElementById('subscribeBtn');
            btn.disabled = !selectedPlan || !customerName || !customerEmail || !agreeTerms;
        }

        document.getElementById('customerName').addEventListener('input', updateSubscribeButton);
        document.getElementById('customerEmail').addEventListener('input', updateSubscribeButton);
        document.getElementById('agreeTerms').addEventListener('change', updateSubscribeButton);

        document.getElementById('subscribeBtn').addEventListener('click', async function() {
            if (!selectedPlan) {
                alert('请先选择订阅方案');
                return;
            }
            
            const agreeTerms = document.getElementById('agreeTerms').checked;
            if (!agreeTerms) {
                alert('请同意隐私政策和服务条款');
                return;
            }
            
            const customerInfo = {
                name: document.getElementById('customerName').value.trim(),
                email: document.getElementById('customerEmail').value.trim(),
                phone: document.getElementById('customerPhone').value.trim()
            };
            
            const btn = this;
            btn.disabled = true;
            btn.innerHTML = '<i class="fa fa-spinner fa-spin mr-2"></i>处理中...';
            
            try {
                const response = await fetch('/api/subscription/create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        planId: selectedPlan.id,
                        customerInfo,
                        agreeTerms
                    })
                });
                
                const data = await response.json();
                
                if (data.success && data.paymentUrl) {
                    const subscriptionData = {
                        subscriptionId: data.subscription.id,
                        planId: selectedPlan.id,
                        planName: selectedPlan.name,
                        customerInfo
                    };
                    sessionStorage.setItem('pendingSubscription', JSON.stringify(subscriptionData));
                    
                    window.location.href = data.paymentUrl;
                } else {
                    throw new Error(data.error || '创建订阅失败');
                }
            } catch (error) {
                console.error('Subscription error:', error);
                alert('创建订阅失败: ' + error.message);
                btn.disabled = false;
                btn.innerHTML = '<i class="fa fa-shopping-cart mr-2"></i>立即订阅';
            }
        });

        loadPlanInfo();
    </script>
</body>
</html>
