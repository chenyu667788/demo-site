<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付失败 - Evonet Direct API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        danger: '#EF4444',
                        neutral: '#6B7280',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-100 text-danger mb-6">
                    <i class="fa fa-times text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">支付失败</h1>
                <p class="text-neutral mb-6">很抱歉，您的支付未能成功处理，请稍后重试。</p>
                <div class="space-y-2 mb-8">
                    <div class="flex justify-between">
                        <span class="text-neutral">状态:</span>
                        <span class="font-medium text-danger">失败</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-neutral">时间:</span>
                        <span class="font-medium" id="currentTime"></span>
                    </div>
                </div>
                <a href="index.html" class="inline-block bg-primary hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-md transition-colors duration-200">
                    <i class="fa fa-home mr-2"></i>返回首页
                </a>
            </div>
        </div>
    </div>
    <script>
        // 显示当前时间
        document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
    </script>
</body>
</html>
