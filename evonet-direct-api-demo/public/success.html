<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>支付成功 - Evonet Direct API</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563EB',
                        secondary: '#10B981',
                        neutral: '#6B7280',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                },
            }
        }
    </script>
</head>
<body class="bg-gray-50 font-sans">
    <div class="min-h-screen flex flex-col items-center justify-center p-4">
        <div class="bg-white rounded-lg shadow-lg p-8 max-w-md w-full">
            <div class="text-center">
                <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-green-100 text-secondary mb-6">
                    <i class="fa fa-check text-2xl"></i>
                </div>
                <h1 class="text-2xl font-bold text-gray-900 mb-2">支付成功</h1>
                <p class="text-neutral mb-6">您的支付已成功处理，感谢您的购买！</p>
                <div class="space-y-2 mb-8">
                    <div class="flex justify-between">
                        <span class="text-neutral">状态:</span>
                        <span class="font-medium text-secondary">成功</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-neutral">时间:</span>
                        <span class="font-medium" id="currentTime"></span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-neutral">订单号:</span>
                        <span class="font-medium" id="displayOrderId">-</span>
                    </div>
                </div>
                <div class="space-y-3">
                    <a href="order-tracking.html" class="block w-full bg-primary hover:bg-blue-700 text-white font-medium py-3 px-6 rounded-md transition-colors duration-200">
                        <i class="fa fa-search mr-2"></i>查询订单
                    </a>
                    <a href="index.html" class="block w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-medium py-3 px-6 rounded-md transition-colors duration-200">
                        <i class="fa fa-home mr-2"></i>返回首页
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // 显示当前时间
        document.getElementById('currentTime').textContent = new Date().toLocaleString('zh-CN');
        
        // 从URL参数获取订单ID
        const urlParams = new URLSearchParams(window.location.search);
        const orderId = urlParams.get('orderId') || urlParams.get('merchantTransID');
        if (orderId) {
            document.getElementById('displayOrderId').textContent = orderId;
            // 保存到localStorage供订单查询页面使用
            localStorage.setItem('lastOrderId', orderId);
        }
    </script>
</body>
</html>
